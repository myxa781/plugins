<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7C4DFF">
  <meta name="color-scheme" content="dark">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <title>404 — Murglar Plugins</title>
  <link rel="stylesheet" href="css/material.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="page-404">
  <img src="assets/logo.svg" alt="Murglar" style="width:72px;height:72px;border-radius:18px;margin-bottom:32px;opacity:.6">
  <div class="page-404-code">404</div>
  <h1 class="page-404-title">Страница не найдена</h1>
  <p class="page-404-desc">
    Возможно, плагин был удалён, переименован, или вы перешли по неверной ссылке.
  </p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <a href="index.html" class="btn btn-filled">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Каталог плагинов
    </a>
    <button class="btn btn-outlined" onclick="history.back()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Назад
    </button>
  </div>
</div>

</html>
